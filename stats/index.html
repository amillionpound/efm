<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>访问统计 - 银企直联知识库</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #333; padding: 16px; }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 20px; color: #1a73e8; margin-bottom: 6px; }
  .header .sub { font-size: 12px; color: #999; }
  .range-btns { display: flex; justify-content: center; gap: 8px; margin: 12px 0 20px; }
  .range-btns button { padding: 6px 16px; border: 1px solid #1a73e8; border-radius: 20px; background: #fff; color: #1a73e8; cursor: pointer; font-size: 13px; transition: all .2s; }
  .range-btns button.active { background: #1a73e8; color: #fff; }
  .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
  @media(min-width:600px){ .cards { grid-template-columns: repeat(4, 1fr); } }
  .card { background: #fff; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .card .value { font-size: 28px; font-weight: 700; color: #1a73e8; }
  .card .value.green { color: #0d904f; }
  .card .value.orange { color: #e8710a; }
  .card .value.purple { color: #7b1fa2; }
  .section { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .section h2 { font-size: 15px; margin-bottom: 12px; color: #555; border-bottom: 1px solid #eee; padding-bottom: 8px; }
  .bar-row { display: flex; align-items: center; margin: 6px 0; font-size: 13px; }
  .bar-label { width: 80px; text-align: right; padding-right: 8px; color: #666; flex-shrink: 0; }
  .bar-track { flex: 1; height: 22px; background: #f0f0f0; border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; min-width: 2px; }
  .bar-value { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 11px; color: #333; font-weight: 600; }
  .chart-area { display: flex; align-items: flex-end; gap: 3px; height: 120px; padding: 8px 0; overflow-x: auto; }
  .chart-bar { flex: 1; min-width: 12px; max-width: 40px; background: linear-gradient(180deg, #1a73e8, #4d9bf5); border-radius: 3px 3px 0 0; position: relative; cursor: pointer; transition: opacity .2s; }
  .chart-bar:hover { opacity: .8; }
  .chart-bar .tip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; opacity: 0; pointer-events: none; margin-bottom: 4px; }
  .chart-bar:hover .tip { opacity: 1; }
  .chart-x { display: flex; gap: 3px; margin-top: 4px; }
  .chart-x span { flex: 1; min-width: 12px; max-width: 40px; text-align: center; font-size: 9px; color: #aaa; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 6px 8px; color: #888; border-bottom: 2px solid #eee; font-weight: 600; white-space: nowrap; }
  td { padding: 6px 8px; border-bottom: 1px solid #f5f5f5; }
  tr:hover td { background: #f9f9f9; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .tag-cloudstudio { background: #e8f0fe; color: #1a73e8; }
  .tag-github { background: #e8f5e9; color: #0d904f; }
  .tag-scf { background: #fff3e0; color: #e8710a; }
  .tag-other { background: #f3e5f5; color: #7b1fa2; }
  .tag-home { background: #e3f2fd; color: #1565c0; }
  .tag-install { background: #e8f5e9; color: #2e7d32; }
  .tag-api { background: #fff3e0; color: #e65100; }
  .tag-connect { background: #fce4ec; color: #c62828; }
  .tag-download { background: #f3e5f5; color: #6a1b9a; }
  .tag-faq { background: #e0f7fa; color: #00838f; }
  .empty { text-align: center; padding: 40px; color: #ccc; font-size: 14px; }
  .loading { text-align: center; padding: 40px; color: #999; }
  .refresh { text-align: center; margin: 20px 0; }
  .refresh button { padding: 8px 24px; border: none; border-radius: 20px; background: #1a73e8; color: #fff; cursor: pointer; font-size: 13px; }
</style>
</head>
<body>
<div class="header">
  <h1>银企直联知识库 - 访问统计</h1>
  <div class="sub">数据来源：SCF + COS 实时统计</div>
</div>

<div class="range-btns">
  <button data-days="7">近7天</button>
  <button data-days="30" class="active">近30天</button>
  <button data-days="90">近90天</button>
</div>

<div class="cards">
  <div class="card"><div class="label">今日访问</div><div class="value" id="todayViews">-</div></div>
  <div class="card"><div class="label">今日访客</div><div class="value green" id="todayVisitors">-</div></div>
  <div class="card"><div class="label">总访问量</div><div class="value orange" id="totalViews">-</div></div>
  <div class="card"><div class="label">总访客数</div><div class="value purple" id="totalVisitors">-</div></div>
</div>

<div class="section">
  <h2>每日访问趋势</h2>
  <div id="dailyChart" class="loading">加载中...</div>
</div>

<div class="section">
  <h2>页面分布</h2>
  <div id="tabDist"></div>
</div>

<div class="section">
  <h2>来源分布</h2>
  <div id="sourceDist"></div>
</div>

<div class="section">
  <h2>最近访问明细</h2>
  <div id="recentTable" class="loading">加载中...</div>
</div>

<div class="refresh"><button onclick="loadData()">刷新数据</button></div>

<script>
var STATS_URL = 'https://1256784020-e0oiiqytiv.ap-guangzhou.tencentscf.com/stats';
var currentDays = 30;
var tabNames = { home:'快速开始', install:'部署安装', api:'接口文档', connect:'接入指引', download:'下载专区', faq:'常见问题' };
var sourceNames = { cloudstudio:'沙箱', github:'GitHub', scf:'SCF', other:'其他' };
var barColors = ['#1a73e8','#0d904f','#e8710a','#7b1fa2','#c62828','#00838f','#1565c0','#6a1b9a'];

document.querySelectorAll('.range-btns button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.range-btns button').forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    currentDays = parseInt(this.dataset.days);
    loadData();
  });
});

function renderBars(containerId, data, nameMap) {
  var el = document.getElementById(containerId);
  var entries = Object.entries(data).sort(function(a,b) { return b[1] - a[1]; });
  if (!entries.length) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
  var max = entries[0][1];
  el.innerHTML = entries.map(function(e, i) {
    var key = e[0], val = e[1];
    var pct = max > 0 ? Math.round(val / max * 100) : 0;
    var name = nameMap[key] || key;
    var color = barColors[i % barColors.length];
    return '<div class="bar-row"><div class="bar-label">' + name + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"></div><div class="bar-value">' + val + '</div></div></div>';
  }).join('');
}

function renderChart(daily) {
  var el = document.getElementById('dailyChart');
  if (!daily.length) { el.innerHTML = '<div class="empty">暂无数据</div>'; el.className = 'empty'; return; }
  el.className = '';
  var max = Math.max.apply(null, daily.map(function(d) { return d.views; }));
  if (max === 0) max = 1;
  var html = '<div class="chart-area">';
  daily.forEach(function(d) {
    var h = Math.round(d.views / max * 100);
    if (h < 2 && d.views > 0) h = 2;
    var shortDate = d.date.slice(5); // MM-DD
    html += '<div class="chart-bar" style="height:' + h + '%"><span class="tip">' + d.date + ': ' + d.views + '次</span></div>';
  });
  html += '</div><div class="chart-x">';
  // Show every Nth label
  var step = Math.ceil(daily.length / 12);
  daily.forEach(function(d, i) {
    var label = (i % step === 0 || i === daily.length - 1) ? d.date.slice(5) : '';
    html += '<span>' + label + '</span>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderRecent(recent) {
  var el = document.getElementById('recentTable');
  if (!recent.length) { el.innerHTML = '<div class="empty">暂无记录</div>'; el.className = 'empty'; return; }
  el.className = '';
  var html = '<table><thead><tr><th>时间</th><th>来源</th><th>页面</th><th>类型</th></tr></thead><tbody>';
  recent.forEach(function(ev) {
    var ts = ev.ts || '';
    var time = ts.length >= 16 ? ts.slice(5, 16).replace('T', ' ') : ts;
    var src = ev.source || 'other';
    var tab = ev.tab || '';
    var type = ev.type === 'page_view' ? '打开页面' : '切换页面';
    var tabName = tabNames[tab] || tab || '-';
    html += '<tr><td>' + time + '</td><td><span class="tag tag-' + src + '">' + (sourceNames[src] || src) + '</span></td><td><span class="tag tag-' + tab + '">' + tabName + '</span></td><td>' + type + '</td></tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function loadData() {
  var url = STATS_URL + '?days=' + currentDays;
  document.getElementById('dailyChart').className = 'loading';
  document.getElementById('dailyChart').innerHTML = '加载中...';
  document.getElementById('recentTable').className = 'loading';
  document.getElementById('recentTable').innerHTML = '加载中...';

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        document.getElementById('todayViews').textContent = '!';
        document.getElementById('dailyChart').innerHTML = '<div class="empty">加载失败: ' + data.error + '</div>';
        return;
      }
      var ov = data.overview || {};
      document.getElementById('todayViews').textContent = ov.today_views || 0;
      document.getElementById('todayVisitors').textContent = ov.today_visitors || 0;
      document.getElementById('totalViews').textContent = ov.total_views || 0;
      document.getElementById('totalVisitors').textContent = ov.total_visitors || 0;
      renderChart(data.daily || []);
      renderBars('tabDist', data.tabs || {}, tabNames);
      renderBars('sourceDist', data.sources || {}, sourceNames);
      renderRecent(data.recent || []);
    })
    .catch(function(err) {
      document.getElementById('dailyChart').innerHTML = '<div class="empty">网络错误: ' + err.message + '</div>';
      document.getElementById('recentTable').innerHTML = '<div class="empty">网络错误</div>';
    });
}

loadData();
</script>
</body>
</html>
